# kitty.conf — Tokyo Night theme + JetBrainsMono + 75% opacity.
# Color palette sourced from: https://github.com/davidmathers/tokyo-night-kitty-theme

# -- Font ------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.5

# -- Performance -----------------------------------------------------------------
repaint_delay   10
input_delay     3
sync_to_monitor yes

# -- Remote control --------------------------------------------------------------
allow_remote_control yes
listen_on            unix:/tmp/kitty

# -- Window ----------------------------------------------------------------------
background_opacity         0.75
dynamic_background_opacity yes
hide_window_decorations    no
window_padding_width       8

# -- Cursor ----------------------------------------------------------------------
cursor_shape          block
cursor_blink_interval 0

# -- Scrollback ------------------------------------------------------------------
scrollback_lines 10000

# -- Mouse -----------------------------------------------------------------------
copy_on_select yes

# -- Colors — Tokyo Night --------------------------------------------------------
foreground #a9b1d6
background #1a1b26

# Normal colors
color0  #414868
color1  #f7768e
color2  #73daca
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #c0caf5

# Bright colors (same as normal for Tokyo Night)
color8  #414868
color9  #f7768e
color10 #73daca
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Misc colors
cursor               #c0caf5
cursor_text_color    #1a1b26
selection_foreground none
selection_background #28344a
url_color            #9ece6a

# -- Tab bar ---------------------------------------------------------------------
tab_bar_edge            top
tab_bar_min_tabs        1
tab_bar_style           custom
tab_bar_background      #101014

# -- Borders ---------------------------------------------------------------------
active_border_color   #3d59a1
inactive_border_color #101014
bell_border_color     #e0af68
