# hypridle.conf — Idle daemon: dims screen → locks session → display off → suspends.

general {
    lock_cmd         = pidof quickshell || qylock-lock  # avoid spawning a second qylock
    before_sleep_cmd = loginctl lock-session        # always lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on     # restore display on wake
}

# 5 min: dim to 20% to signal inactivity (restores on resume)
listener {
    timeout    = 300
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# 10 min: lock the session
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# 11 min: turn off display (1 min after lock so screen is already locked)
listener {
    timeout    = 660
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min: suspend the system
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
