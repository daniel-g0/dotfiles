# hyprlock.conf — Lock screen: blurred wallpaper + clock + date + password field.
# Colors follow the Tokyo Night palette.

general {
    disable_loading_bar = true  # no progress bar on startup
    hide_cursor         = true  # hide cursor while locked
    grace               = 0     # require password immediately (no grace period)
}

# Background: blurs the current wallpaper; solid Tokyo Night bg as fallback
background {
    monitor      =
    blur_passes  = 7
    blur_size    = 16
    color        = rgba(1a1b26ff)
}

# Password input field
input-field {
    monitor           =
    size              = 300, 50
    outline_thickness = 2
    dots_size         = 0.3
    dots_spacing      = 0.2
    outer_color       = rgba(7aa2f7ff)  # Tokyo Night blue border
    inner_color       = rgba(24283bff)  # dark fill
    font_color        = rgba(c0caf5ff)  # light text
    fade_on_empty     = true
    placeholder_text  = <span foreground="##565f89">password...</span>
    fail_color        = rgba(f7768eff)  # red on wrong password
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position          = 0, -80
    halign            = center
    valign            = center
}

# Clock — large, refreshes every second
label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
    color       = rgba(c0caf5ff)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position    = 0, 160
    halign      = center
    valign      = center
}

# Date — smaller, refreshes every minute
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color       = rgba(565f89ff)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position    = 0, 80
    halign      = center
    valign      = center
}
