general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
}

background {
    monitor =
    blur_passes  = 3
    blur_size    = 8
    color        = rgba(1a1b26ff)
}

input-field {
    monitor =
    size             = 300, 50
    outline_thickness = 2
    dots_size        = 0.3
    dots_spacing     = 0.2
    outer_color      = rgba(7aa2f7ff)
    inner_color      = rgba(24283bff)
    font_color       = rgba(c0caf5ff)
    fade_on_empty    = true
    placeholder_text = <span foreground="##565f89">password...</span>
    fail_color       = rgba(f7768eff)
    fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position         = 0, -80
    halign           = center
    valign           = center
}

label {
    monitor =
    text     = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
    color    = rgba(c0caf5ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color    = rgba(565f89ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign   = center
    valign   = center
}
