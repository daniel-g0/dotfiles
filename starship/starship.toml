# starship.toml — Tokyo Night, no background, minimal

format = """
[ ](fg:#7aa2f7)\
$directory\
$git_branch\
$git_status\
$c$python$nodejs$rust$golang$java$docker_context\
$fill\
$cmd_duration\
$username$hostname\
"""

add_newline = false

# -- Directory -------------------------------------------------------------------
[directory]
style             = "fg:#7aa2f7"
format            = "[  $path ]($style)"
truncation_length = 9
truncation_symbol = "…/"
truncate_to_repo  = true
home_symbol       = '~'

[directory.substitutions]
"~" = " ~"

# -- Git -------------------------------------------------------------------------
[git_branch]
style  = "fg:#9ece6a"
format = '[  $branch ]($style)'

[git_status]
style      = "fg:#e0af68"
conflicted = "~"
up_to_date = ""
untracked  = "?"
ahead      = "⇡${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
stashed    = "*"
modified   = " "
staged     = '[++\($count\)](fg:#9ece6a)'
renamed    = " "
deleted    = " "
format     = '[$all_status$ahead_behind ]($style)'

# -- Duration (only shows when cmd takes >2s) ------------------------------------
[cmd_duration]
min_time = 2000
style    = "fg:#e0af68"
format   = '[ $duration ]($style)'

# -- User / host -----------------------------------------------------------------
[username]
show_always = true
style_user  = "fg:#bb9af7"
style_root  = "fg:#f7768e"
format      = '[$user]($style)'

[hostname]
ssh_only = false
style    = "fg:#565f89"
format   = '[@$hostname ]($style)'

# -- Fill (spacer between left and right) ----------------------------------------
[fill]
symbol = ' '

# -- Language symbols (only appear when in a relevant project dir) ----------------
[c]
symbol = ""
style  = "fg:#7dcfff"
format = '[ $symbol ]($style)'

[python]
symbol = ' '
style  = "fg:#e0af68"
format = '[ $symbol ]($style)'

[nodejs]
symbol = ""
style  = "fg:#9ece6a"
format = '[ $symbol ]($style)'

[rust]
symbol = ""
style  = "fg:#ff9e64"
format = '[ $symbol ]($style)'

[golang]
symbol = "go"
style  = "fg:#7dcfff"
format = '[ $symbol ](bold $style)'

[java]
symbol = ""
style  = "fg:#f7768e"
format = '[ $symbol ]($style)'

[docker_context]
symbol = " "
style  = "fg:#7dcfff"
format = '[ $symbol $context ]($style)'
